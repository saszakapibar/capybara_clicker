<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sasza Kapibar Clicker</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-image: url('image.webp'); background-size: cover; background-position: center; background-attachment: fixed; user-select: none; }

        
        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .start-btn { padding: 20px 40px; font-size: 2rem; background: #238636; color: white; border: none; border-radius: 10px; cursor: pointer; }

        .lang-selector { position: fixed; top: 20px; right: 20px; display: flex; gap: 5px; z-index: 100; }
        .lang-btn { background: #30363d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

        .game-container { background-color: rgba(13, 17, 23, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #30363d; text-align: center; width: 90%; max-width: 450px; }
        .title-text { font-size: 1.8rem; margin-bottom: 10px; color: #fff; }
        .score-board { font-size: 2rem; font-weight: bold; margin: 15px 0; color: #00f2fe; }

        .main-button { background: none; border: none; cursor: pointer; transition: transform 0.05s ease; }
        .capybara-img { width: 200px; height: 200px; border-radius: 20px; object-fit: cover; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        .leaf { position: absolute; font-size: 20px; pointer-events: none; animation: fly 1s linear forwards; z-index: 10; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }

        .donate-btn { position: fixed; bottom: 20px; left: 20px; background: #FFDD00; color: #000; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; z-index: 100; }
        
        .shop-item { display: flex; align-items: center; justify-content: space-between; background: #161b22; padding: 8px; margin: 5px 0; border-radius: 8px; }
        .thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; margin-right: 10px; }
        button { background: #238636; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Ekran Startowy -->
    <div id="startScreen">
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://archive.org/download/2015-2019_202101/%D0%97%D0%B2%D1%83%D0%BA%D0%B8%20%D0%BF%D1%80%D0%B8%D1%80%D0%BE%D0%B4%D1%8B%20%D0%B4%D0%BB%D1%8F%20%D1%80%D0%B5%D0%BB%D0%B0%D0%BA%D1%81%D0%B0%D1%86%D0%B8%D0%B8%20%D0%B8%20%D1%81%D0%BD%D0%B0%20-%20%D0%9A%D0%BE%D0%BB%D0%BB%D0%B5%D0%BA%D1%86%D0%B8%D1%8F%20%282015-2019%29/04%20-%20%D0%9F%D0%B5%D1%81%D0%BD%D1%8F%20%D0%BF%D1%82%D0%B8%D1%86%D1%8B%20%D1%81%D0%BE%20%D1%81%D0%BF%D0%BE%D0%BA%D0%BE%D0%B9%D0%BD%D0%BE%D0%B9%20%D1%80%D0%B5%D0%BA%D0%B8.mp3" type="audio/mpeg">
    </audio>

    <div class="lang-selector">
        <button class="lang-btn" onclick="setLang('PL')">PL</button>
        <button class="lang-btn" onclick="setLang('EN')">EN</button>
        <button class="lang-btn" onclick="setLang('RU')">RU</button>
    </div>

    <a href="https://saszakapibar.github.io/" class="donate-btn" id="ui-donate">Donate me if you can</a>

    <div class="game-container">
        <div class="title-text" id="ui-title">Sasza Kapibar Clicker</div>
        <div class="score-board" id="ui-score">Punkty: 0</div>
        <button class="main-button" onclick="clickCapybara(event)"><img src="766822_poster.jpg" id="mainImage" class="capybara-img"></button>
        <div id="shopContainer"></div>
    </div>

    <script>
        let lang = 'PL', score = 0, currentId = 0, unlocked =;
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('bgMusic').play();
        }

        const data = {
            PL: { title: "Sasza Kapibar Clicker", score: "Punkty: ", donate: "Wesprzyj mnie", equip: "E", names: ["Kujon", "Rodzina", "Pływająca", "Czillująca", "BOSS"] },
            EN: { title: "Sasza Kapibar Clicker", score: "Points: ", donate: "Donate me if you can", equip: "E", names: ["Nerd", "Family", "Swimming", "Chilling", "BOSS"] },
            RU: { title: "Sasza Kapibar Clicker", score: "Очки: ", donate: "Поддержи меня", equip: "E", names: ["Ботан", "Семья", "Плавающая", "Отдыхающая", "БОСС"] }
        };

        const capybaras = [
            { id: 0, file: '766822_poster.jpg', cost: 0, power: 1 },
            { id: 1, file: 'cappybara-edit-.webp', cost: 50, power: 3 },
            { id: 2, file: 'ezgif-551d5686cbcf2947.webp', cost: 200, power: 10 },
            { id: 3, file: 'gettyimages-2224319510-capybara (1).webp', cost: 1000, power: 50 },
            { id: 4, file: 'boss.png', cost: 20000, power: 1000 }
        ];

        function setLang(newLang) { lang = newLang; render(); }

        function clickCapybara(e) {
            score += capybaras[currentId].power;
            const leaf = document.createElement('div');
            leaf.className = 'leaf'; leaf.innerHTML = '🍃';
            leaf.style.left = e.clientX + 'px'; leaf.style.top = e.clientY + 'px';
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 1000);
            render();
        }

        function render() {
            document.getElementById('ui-title').innerText = data[lang].title;
            document.getElementById('ui-score').innerText = data[lang].score + score;
            document.getElementById('ui-donate').innerText = data[lang].donate;
            const cont = document.getElementById('shopContainer'); cont.innerHTML = '';
            capybaras.forEach((c, i) => {
                const isU = unlocked.includes(c.id);
                cont.innerHTML += `<div class="shop-item">
                    <img src="${c.file}" class="thumb">
                    <span>${data[lang].names[i]}</span>
                    <button onclick="buy(${c.id})">${isU ? data[lang].equip : c.cost}</button>
                </div>`;
            });
        }

        function buy(id) {
            if (unlocked.includes(id)) currentId = id;
            else if (score >= capybaras[id].cost) { score -= capybaras[id].cost; unlocked.push(id); currentId = id; }
            document.getElementById('mainImage').src = capybaras[currentId].file;
            render();
        }
        render();
    </script>
</body>
</html>
